<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Finanças do Lar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Nunito:wght@300;400;600;700;800&family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08090f;--surface:#0e101a;--surface2:#141824;
  --border:#1c2030;--border2:#252d42;
  --text:#eef0f6;--text2:#8892a4;--text3:#4d576a;
  --green:#2dce7a;--green-bg:rgba(45,206,122,.12);
  --red:#f05c6e;--red-bg:rgba(240,92,110,.1);
  --blue:#4a9eff;--blue-bg:rgba(74,158,255,.12);
  --amber:#f5a623;--amber-bg:rgba(245,166,35,.1);
  --pink:#e855a3;--pink-bg:rgba(232,85,163,.12);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.12);
  --r:14px;--rs:9px;
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
  --fs-base:15px;
  --radius-card:14px;--radius-btn:9px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fb);background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden;font-size:var(--fs-base);}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
button{cursor:pointer;font-family:var(--fb);}
input,select,textarea{font-family:var(--fb);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.1);}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;}
.spinner{width:36px;height:36px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .9s linear infinite;}
#loading-screen p{color:var(--text3);font-size:13px;}

.sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;font-family:var(--fh);}
.sync-online{background:var(--green-bg);color:var(--green);border:1px solid rgba(45,206,122,.3);}
.sync-offline{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,92,110,.3);}
.sync-connecting{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,166,35,.3);}
.sync-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s ease-in-out infinite;}

#login-screen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:44px 32px;max-width:380px;width:100%;text-align:center;animation:fadeIn .4s ease;}
.login-logo{font-size:48px;margin-bottom:16px;display:block;}
.login-title{font-family:var(--fh);color:var(--text);font-size:28px;font-weight:800;margin-bottom:6px;letter-spacing:-1px;}
.login-sub{color:var(--text3);font-size:14px;margin-bottom:32px;}
.login-prompt{color:var(--text2);font-size:11px;font-weight:700;margin-bottom:14px;text-transform:uppercase;letter-spacing:1.5px;}
.login-btns{display:flex;gap:12px;margin-bottom:24px;}
.login-btn{flex:1;border-radius:16px;padding:22px 12px;display:flex;flex-direction:column;align-items:center;gap:10px;transition:transform .2s;border:1.5px solid;background:transparent;}
.login-btn:hover{transform:translateY(-3px);}
.login-btn-marido{border-color:rgba(74,158,255,.4);background:rgba(74,158,255,.06);}
.login-btn-esposa{border-color:rgba(232,85,163,.4);background:rgba(232,85,163,.06);}
.login-btn-emoji{font-size:38px;}
.login-btn-label{font-family:var(--fh);font-size:14px;font-weight:700;}
.login-btn-marido .login-btn-label{color:var(--blue);}
.login-btn-esposa .login-btn-label{color:var(--pink);}
.login-note{color:var(--text3);font-size:12px;line-height:1.7;}

#app-screen{display:none;flex-direction:column;min-height:100vh;max-width:520px;margin:0 auto;}

.app-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(8,9,15,.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;gap:8px;backdrop-filter:blur(12px);}
.header-left{display:flex;align-items:center;gap:10px;}
.header-info .htitle{font-family:var(--fh);color:var(--text);font-size:14px;font-weight:800;}
.header-info .utag{font-size:11px;font-weight:700;margin-top:1px;}
.utag.marido{color:var(--blue);}.utag.esposa{color:var(--pink);}
.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.hbtn{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:6px 11px;color:var(--text2);font-size:11px;font-weight:600;transition:all .2s;}
.hbtn:hover{color:var(--text);}

.balance-bar{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--surface);border-bottom:1px solid var(--border);}
.balance-item{display:flex;flex-direction:column;align-items:center;padding:11px 8px;position:relative;}
.balance-item:not(:last-child)::after{content:'';position:absolute;right:0;top:20%;bottom:20%;width:1px;background:var(--border);}
.bal-lbl{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:var(--fh);}
.bal-val{font-family:var(--fh);font-size:14px;font-weight:800;letter-spacing:-.5px;}

.month-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:9px 16px;background:var(--bg);border-bottom:1px solid var(--border);}
.month-nav{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:16px;transition:all .2s;}
.month-nav:hover{color:var(--text);border-color:var(--blue);}
.month-label{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--text);min-width:150px;text-align:center;}

.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:99;}
.tab-btn{flex:1;background:transparent;border:none;border-bottom:2px solid transparent;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:border-color .2s;}
.tab-btn.active{border-bottom-color:var(--blue);}
.tab-icon{font-size:14px;}
.tab-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-family:var(--fh);}
.tab-btn.active .tab-label{color:var(--blue);}

.content{padding:14px 13px;flex:1;}
.panel{display:none;}.panel.active{display:block;}
.section-title{font-family:var(--fh);color:var(--text);font-size:19px;font-weight:800;margin-bottom:16px;letter-spacing:-.5px;}

.msg-box{border-radius:var(--rs);padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:12px;animation:fadeIn .3s;}
.msg-ok{background:var(--green-bg);border:1px solid rgba(45,206,122,.3);color:var(--green);}
.msg-err{background:var(--red-bg);border:1px solid rgba(240,92,110,.3);color:var(--red);}
.empty-state{text-align:center;color:var(--text3);padding:50px 20px;font-size:14px;line-height:2;}

.type-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.type-btn{border-radius:var(--rs);padding:12px;font-weight:700;font-size:13px;transition:all .2s;border:1.5px solid var(--border2);background:var(--surface);color:var(--text3);}
.type-btn.ae{background:var(--red-bg);border-color:rgba(240,92,110,.5);color:var(--red);}
.type-btn.ai{background:var(--green-bg);border-color:rgba(45,206,122,.5);color:var(--green);}
.form-label{display:block;font-size:10px;color:var(--text3);margin-bottom:5px;margin-top:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-family:var(--fh);}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--border2);}
.form-input::placeholder{color:var(--text3);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.pay-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 8px;color:var(--text3);font-weight:600;font-size:12px;transition:all .2s;text-align:center;}
.pay-btn.active{background:var(--blue-bg);border-color:rgba(74,158,255,.4);color:var(--blue);}
.save-btn{width:100%;background:linear-gradient(135deg,var(--blue),#2d7dd6);border:none;border-radius:var(--r);padding:14px;color:#fff;font-size:15px;font-weight:700;margin-top:18px;font-family:var(--fh);transition:opacity .2s;}
.save-btn:disabled{opacity:.5;cursor:not-allowed;}
.cancel-btn{width:100%;background:transparent;border:1px solid var(--border2);border-radius:var(--r);padding:11px;color:var(--text3);font-size:13px;font-weight:600;margin-top:8px;}
.user-info-row{margin-top:12px;font-size:12px;color:var(--text3);background:var(--surface);border-radius:8px;padding:9px 13px;border:1px solid var(--border);}

.installment-box{background:var(--purple-bg);border:1px solid rgba(167,139,250,.25);border-radius:var(--rs);padding:12px 14px;margin-top:10px;}
.installment-title{font-size:11px;color:var(--purple);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-family:var(--fh);}
.inst-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.chips-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--text2);font-weight:600;transition:all .2s;}
.chip:hover,.chip.active{background:var(--blue-bg);border-color:rgba(74,158,255,.4);color:var(--blue);}

/* CARD CHIPS */
.card-chips-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
.card-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--text2);font-weight:600;transition:all .2s;cursor:pointer;}
.card-chip:hover,.card-chip.active{background:var(--amber-bg);border-color:rgba(245,166,35,.4);color:var(--amber);}

.tx-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s,transform .15s;animation:fadeIn .3s;}
.tx-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.tx-card.is-installment{border-left:3px solid var(--purple);}
.tx-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.tx-left{flex:1;min-width:0;}
.tx-cat-row{display:flex;align-items:center;gap:5px;margin-bottom:2px;flex-wrap:wrap;}
.tx-cat{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.7px;}
.tx-subcat{font-size:10px;background:var(--surface2);color:var(--text3);border-radius:4px;padding:1px 6px;border:1px solid var(--border);}
.tx-inst-badge{font-size:10px;background:var(--purple-bg);color:var(--purple);border-radius:4px;padding:1px 6px;border:1px solid rgba(167,139,250,.3);}
.tx-card-badge{font-size:10px;background:var(--amber-bg);color:var(--amber);border-radius:4px;padding:1px 6px;border:1px solid rgba(245,166,35,.3);}
.tx-desc{font-size:14px;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-amount{font-family:var(--fh);font-size:15px;font-weight:800;flex-shrink:0;margin-left:10px;}
.tx-meta{display:flex;gap:6px;font-size:10px;color:var(--text3);flex-wrap:wrap;align-items:center;margin-top:3px;}
.tx-pay{color:var(--blue);font-weight:600;}
.tx-badge{border-radius:4px;padding:1px 7px;font-weight:700;font-size:10px;}
.tx-badge-marido{background:var(--blue-bg);color:var(--blue);}
.tx-badge-esposa{background:var(--pink-bg);color:var(--pink);}
.tx-edited{color:var(--amber);}

.filter-bar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:3px;}
.filter-bar::-webkit-scrollbar{display:none;}
.flt-btn{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:11px;color:var(--text3);font-weight:600;white-space:nowrap;flex-shrink:0;transition:all .2s;}
.flt-btn.active{background:var(--blue-bg);border-color:rgba(74,158,255,.4);color:var(--blue);}
.search-wrap{position:relative;margin-bottom:10px;}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 13px 10px 36px;color:var(--text);font-size:13px;outline:none;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);}

.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:11px;}
.sum-title{font-family:var(--fh);font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.sum-row:last-child{border-bottom:none;}
.sum-name{font-size:13px;color:var(--text);}
.sum-val{font-family:var(--fh);font-size:13px;font-weight:700;}
.cat-row{margin-bottom:12px;}
.cat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.cat-name{font-size:13px;color:var(--text);}
.cat-pct{font-size:11px;color:var(--text3);}
.cat-val{font-family:var(--fh);font-size:13px;color:var(--red);font-weight:700;}
.cat-bar-bg{background:var(--border);border-radius:4px;height:4px;}
.cat-bar-fill{background:linear-gradient(90deg,var(--blue),#2d7dd6);border-radius:4px;height:4px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.cat-bar-fill-amber{background:linear-gradient(90deg,var(--amber),#d4840a);border-radius:4px;height:4px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.person-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px;}
.person-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;}
.person-emoji{font-size:26px;margin-bottom:5px;}
.person-name{font-family:var(--fh);font-size:12px;font-weight:700;margin-bottom:7px;}
.person-name.marido{color:var(--blue);}.person-name.esposa{color:var(--pink);}
.person-amount{font-family:var(--fh);font-size:19px;font-weight:800;color:var(--red);}
.person-count{font-size:11px;color:var(--text3);margin-top:2px;}
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:11px;text-align:center;}
.score-num{font-family:var(--fh);font-size:58px;font-weight:800;letter-spacing:-3px;line-height:1;}
.score-lbl{font-size:13px;color:var(--text2);margin-top:5px;}
.score-bar-bg{background:var(--border);border-radius:8px;height:7px;margin:12px 0 6px;}
.score-bar-fill{height:7px;border-radius:8px;transition:width 1s;}
.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:9px;display:flex;gap:11px;align-items:flex-start;animation:fadeIn .3s;}
.insight-icon{font-size:20px;flex-shrink:0;}
.insight-text{font-size:13px;color:var(--text2);line-height:1.6;}
.insight-text strong{color:var(--text);}

.inst-sum-card{background:var(--purple-bg);border:1px solid rgba(167,139,250,.25);border-radius:var(--r);padding:15px;margin-bottom:11px;}
.inst-sum-title{font-family:var(--fh);font-size:10px;color:var(--purple);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.inst-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(167,139,250,.15);}
.inst-item:last-child{border-bottom:none;}
.inst-name{font-size:13px;color:var(--text);flex:1;}
.inst-info{font-size:11px;color:var(--purple);font-weight:600;}

/* CARD SUMMARY */
.card-sum-card{background:var(--amber-bg);border:1px solid rgba(245,166,35,.25);border-radius:var(--r);padding:15px;margin-bottom:11px;}
.card-sum-title{font-family:var(--fh);font-size:10px;color:var(--amber);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.card-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(245,166,35,.15);}
.card-item:last-child{border-bottom:none;}
.card-item-left{flex:1;}
.card-item-name{font-size:13px;color:var(--text);font-weight:600;}
.card-item-count{font-size:11px;color:var(--text3);margin-top:2px;}
.card-item-val{font-family:var(--fh);font-size:14px;font-weight:800;color:var(--amber);}

.stab-row{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.stab-btn{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--text3);font-weight:600;transition:all .2s;white-space:nowrap;}
.stab-btn.active{background:var(--blue-bg);border-color:rgba(74,158,255,.4);color:var(--blue);}
.stab-panel{display:none;}.stab-panel.active{display:block;}

.settings-section{margin-bottom:22px;}
.settings-section-title{font-family:var(--fh);font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.settings-section-desc{font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.6;}

.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.theme-card{border-radius:var(--r);padding:13px 12px;cursor:pointer;border:2px solid var(--border);transition:all .2s;position:relative;background:var(--surface);}
.theme-card:hover{border-color:var(--border2);}
.theme-card.selected{border-color:var(--blue);}
.theme-card.selected::after{content:'✓';position:absolute;top:8px;right:10px;font-size:13px;font-weight:800;color:var(--blue);}
.theme-dots{display:flex;gap:5px;margin-bottom:7px;}
.tdot{width:16px;height:16px;border-radius:50%;}
.theme-name{font-size:12px;font-weight:700;color:var(--text);font-family:var(--fh);}
.theme-sub{font-size:10px;color:var(--text3);margin-top:2px;}

.color-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
.color-section-header{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface2);}
.color-section-header h4{font-family:var(--fh);font-size:12px;font-weight:700;color:var(--text);}
.color-section-header p{font-size:11px;color:var(--text3);margin-top:2px;}
.color-picker-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);}
.color-picker-row:last-child{border-bottom:none;}
.cpick-label{font-size:13px;color:var(--text);font-weight:500;}
.cpick-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.cpick-right{display:flex;align-items:center;gap:8px;}
.cpick-preview{width:28px;height:28px;border-radius:7px;border:2px solid var(--border2);cursor:pointer;transition:transform .15s;}
.cpick-preview:hover{transform:scale(1.1);}
input[type=color]{width:36px;height:36px;border:none;background:transparent;cursor:pointer;padding:0;border-radius:8px;overflow:hidden;}

.font-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.font-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:14px 12px;cursor:pointer;transition:all .2s;text-align:center;}
.font-card:hover{border-color:var(--border2);}
.font-card.selected{border-color:var(--blue);background:var(--blue-bg);}
.font-sample{font-size:20px;font-weight:700;margin-bottom:4px;color:var(--text);}
.font-name{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.8px;}
.font-pair{font-size:10px;color:var(--text3);margin-top:2px;}

.size-row{display:flex;gap:8px;margin-bottom:14px;}
.size-btn{flex:1;background:var(--surface);border:2px solid var(--border);border-radius:var(--rs);padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;}
.size-btn:hover{border-color:var(--border2);}
.size-btn.selected{border-color:var(--blue);background:var(--blue-bg);}
.size-btn-label{display:block;font-weight:700;color:var(--text);margin-bottom:2px;}
.size-btn-val{font-size:10px;color:var(--text3);}

.radius-row{display:flex;gap:8px;margin-bottom:14px;}
.radius-btn{flex:1;background:var(--surface);border:2px solid var(--border);padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;}
.radius-btn.selected{border-color:var(--blue);background:var(--blue-bg);}
.radius-preview{width:32px;height:32px;background:var(--blue);margin:0 auto 6px;}
.radius-label{font-size:11px;color:var(--text3);font-weight:600;}

.spacing-row{display:flex;gap:8px;margin-bottom:14px;}
.spacing-btn{flex:1;background:var(--surface);border:2px solid var(--border);border-radius:var(--rs);padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;}
.spacing-btn:hover{border-color:var(--border2);}
.spacing-btn.selected{border-color:var(--blue);background:var(--blue-bg);}

.cat-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;margin-bottom:7px;}
.cat-item-name{font-size:14px;color:var(--text);}
.cat-item-default{font-size:11px;color:var(--text3);}
.cat-del-btn{background:transparent;border:1px solid rgba(240,92,110,.3);border-radius:6px;padding:4px 9px;color:var(--red);font-size:11px;font-weight:700;}
.add-cat-row{display:flex;gap:8px;margin-top:8px;}
.add-cat-inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 13px;color:var(--text);font-size:14px;outline:none;}
.add-cat-btn{background:linear-gradient(135deg,var(--blue),#2d7dd6);border:none;border-radius:var(--rs);padding:10px 16px;color:#fff;font-size:14px;font-weight:700;}

.reset-btn{width:100%;background:transparent;border:1px solid var(--border2);border-radius:var(--r);padding:11px;color:var(--text3);font-size:13px;font-weight:600;margin-top:4px;transition:all .2s;}
.reset-btn:hover{color:var(--red);border-color:rgba(240,92,110,.4);}

.preview-wrapper{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:16px;}
.preview-title{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-family:var(--fh);}
.preview-mini-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px;}
.preview-mini-title{font-family:var(--fh);font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px;}
.preview-mini-sub{font-size:11px;color:var(--text2);}
.preview-mini-row{display:flex;justify-content:space-between;margin-top:8px;}
.preview-mini-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.preview-mini-green{background:var(--green-bg);color:var(--green);}
.preview-mini-red{background:var(--red-bg);color:var(--red);}
.preview-mini-blue{background:var(--blue-bg);color:var(--blue);}
.preview-mini-btn{background:linear-gradient(135deg,var(--blue),#2d7dd6);border:none;border-radius:var(--rs);padding:8px 14px;color:#fff;font-size:12px;font-weight:700;margin-top:8px;width:100%;}

#modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:flex-end;justify-content:center;}
#modal-ov.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 -30px 80px rgba(0,0,0,.7);animation:slideUp .25s ease;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:15px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.modal-title{font-family:var(--fh);font-weight:800;font-size:15px;color:var(--text);}
.modal-close{background:transparent;border:none;color:var(--text3);font-size:22px;line-height:1;}

.delete-btn{width:100%;background:transparent;border:1px solid rgba(240,92,110,.4);border-radius:var(--r);padding:11px;color:var(--red);font-size:13px;font-weight:700;margin-top:8px;}
.confirm-box{margin-top:10px;background:var(--red-bg);border:1px solid rgba(240,92,110,.3);border-radius:var(--r);padding:13px;}
.confirm-txt{color:#fca5a5;font-size:14px;text-align:center;margin-bottom:11px;}
.confirm-row{display:flex;gap:8px;}
.confirm-yes{flex:1;background:var(--red);border:none;border-radius:8px;padding:10px;color:#fff;font-weight:700;font-size:13px;}
.confirm-no{flex:1;background:var(--surface2);border:none;border-radius:8px;padding:10px;color:var(--text);font-weight:600;font-size:13px;}

.palette-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.palette-chip{display:flex;gap:3px;padding:6px 10px;border-radius:20px;border:2px solid var(--border);cursor:pointer;align-items:center;gap:6px;transition:all .2s;background:var(--surface);}
.palette-chip:hover{border-color:var(--border2);}
.palette-chip.selected{border-color:var(--blue);}
.palette-chip-dots{display:flex;gap:3px;}
.palette-dot{width:12px;height:12px;border-radius:50%;}
.palette-name{font-size:11px;font-weight:600;color:var(--text2);}

.divider{height:1px;background:var(--border);margin:16px 0;}

/* Credit card visual */
.card-visual{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:8px;position:relative;overflow:hidden;}
.card-visual::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.04);}
.card-visual-name{font-family:var(--fh);font-size:13px;font-weight:700;color:#fff;margin-bottom:2px;}
.card-visual-total{font-family:var(--fh);font-size:20px;font-weight:800;color:var(--amber);}
.card-visual-count{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}

</head>

<script>

// ════════════════════════════════════════════════
// APPEARANCE SYSTEM
// ════════════════════════════════════════════════
const THEMES_DATA = [
  {id:"dark-blue",   name:"Dark Blue",    sub:"Padrão",          bg:"#08090f",surface:"#0e101a",surface2:"#141824",border:"#1c2030",border2:"#252d42",text:"#eef0f6",text2:"#8892a4",text3:"#4d576a",accent:"#4a9eff",green:"#2dce7a",red:"#f05c6e",amber:"#f5a623",purple:"#a78bfa",pink:"#e855a3"},
  {id:"dark-green",  name:"Dark Green",   sub:"Natureza",        bg:"#070d0a",surface:"#0b150f",surface2:"#112016",border:"#1a2e20",border2:"#234029",text:"#eef5f0",text2:"#7a9e85",text3:"#3d5e45",accent:"#2dce7a",green:"#2dce7a",red:"#f05c6e",amber:"#f5a623",purple:"#a78bfa",pink:"#e855a3"},
  {id:"dark-purple", name:"Dark Purple",  sub:"Sofisticado",     bg:"#09070f",surface:"#100e1a",surface2:"#171524",border:"#211e30",border2:"#2e2a42",text:"#f0eef6",text2:"#9088a4",text3:"#52496a",accent:"#a78bfa",green:"#2dce7a",red:"#f05c6e",amber:"#f5a623",purple:"#a78bfa",pink:"#e855a3"},
  {id:"dark-rose",   name:"Dark Rose",    sub:"Estilo",          bg:"#0f070a",surface:"#1a0e12",surface2:"#22141a",border:"#301a22",border2:"#42222e",text:"#f6eef1",text2:"#a4889a",text3:"#6a4956",accent:"#e855a3",green:"#2dce7a",red:"#f05c6e",amber:"#f5a623",purple:"#a78bfa",pink:"#e855a3"},
  {id:"midnight",    name:"Midnight",     sub:"Mais escuro",     bg:"#010408",surface:"#060c14",surface2:"#0b1420",border:"#101e2e",border2:"#162840",text:"#ddeeff",text2:"#6a8ba8",text3:"#2e4a63",accent:"#38bdf8",green:"#2dce7a",red:"#f05c6e",amber:"#f5a623",purple:"#a78bfa",pink:"#e855a3"},
  {id:"charcoal",    name:"Charcoal",     sub:"Neutro",          bg:"#0c0c0c",surface:"#161616",surface2:"#1e1e1e",border:"#282828",border2:"#333333",text:"#f0f0f0",text2:"#888888",text3:"#505050",accent:"#e0e0e0",green:"#2dce7a",red:"#f05c6e",amber:"#f5a623",purple:"#a78bfa",pink:"#e855a3"},
  {id:"light",       name:"Light",        sub:"Claro",           bg:"#f4f6f9",surface:"#ffffff",surface2:"#f0f2f5",border:"#e2e6ed",border2:"#c8cfd9",text:"#111827",text2:"#4b5563",text3:"#9ca3af",accent:"#2563eb",green:"#16a34a",red:"#dc2626",amber:"#d97706",purple:"#7c3aed",pink:"#db2777"},
  {id:"light-warm",  name:"Light Warm",   sub:"Suave",           bg:"#faf8f4",surface:"#ffffff",surface2:"#f5f0e8",border:"#e8dfc8",border2:"#d4c8a8",text:"#1c1610",text2:"#6b5b45",text3:"#a89070",accent:"#c2622a",green:"#2d8a4e",red:"#c0392b",amber:"#e67e22",purple:"#8e44ad",pink:"#c0392b"},
];

const FONTS_DATA = [
  {id:"syne-dm",      head:"'Syne',sans-serif",             body:"'DM Sans',sans-serif",           sample:"Aa",name:"Syne + DM Sans",pair:"Títulos Syne"},
  {id:"inter",        head:"'Inter',sans-serif",            body:"'Inter',sans-serif",             sample:"Aa",name:"Inter",pair:"Moderna e limpa"},
  {id:"poppins",      head:"'Poppins',sans-serif",          body:"'Poppins',sans-serif",           sample:"Aa",name:"Poppins",pair:"Arredondada"},
  {id:"space-grotesk",head:"'Space Grotesk',sans-serif",    body:"'Space Grotesk',sans-serif",     sample:"Aa",name:"Space Grotesk",pair:"Geométrica"},
  {id:"nunito",       head:"'Nunito',sans-serif",           body:"'Nunito',sans-serif",            sample:"Aa",name:"Nunito",pair:"Amigável"},
];

const SIZES_DATA = [
  {id:"xs",   label:"Mini",    base:"12px"},
  {id:"sm",   label:"Pequeno", base:"13px"},
  {id:"md",   label:"Médio",   base:"15px"},
  {id:"lg",   label:"Grande",  base:"17px"},
  {id:"xl",   label:"Maior",   base:"19px"},
];

const RADIUS_DATA = [
  {id:"sharp",  label:"Quadrado",   card:"4px",  btn:"4px"},
  {id:"soft",   label:"Suave",      card:"8px",  btn:"6px"},
  {id:"round",  label:"Redondo",    card:"14px", btn:"9px"},
  {id:"pill",   label:"Pílula",     card:"20px", btn:"14px"},
];

const SPACING_DATA = [
  {id:"compact",  label:"Compacto",   mult:"0.8"},
  {id:"normal",   label:"Normal",     mult:"1"},
  {id:"relaxed",  label:"Relaxado",   mult:"1.25"},
];

const COLOR_PALETTES = [
  {id:"neon-dark",   name:"Neon",       colors:{accent:"#00ff88",green:"#00ff88",red:"#ff4466"}},
  {id:"pastel",      name:"Pastel",     colors:{accent:"#7eb8f7",green:"#7edca8",red:"#f7a0a8"}},
  {id:"vibrant",     name:"Vibrante",   colors:{accent:"#ff6b35",green:"#06d6a0",red:"#ef233c"}},
  {id:"mono-blue",   name:"Azul",       colors:{accent:"#60a5fa",green:"#34d399",red:"#f87171"}},
  {id:"mono-purple", name:"Roxo",       colors:{accent:"#c084fc",green:"#4ade80",red:"#f87171"}},
  {id:"gold",        name:"Ouro",       colors:{accent:"#fbbf24",green:"#4ade80",red:"#f87171"}},
];

let APPEARANCE = {
  themeId: "dark-blue",
  fontId:  "syne-dm",
  sizeId:  "md",
  radiusId:"round",
  spacingId:"normal",
  customColors: {},
  curSettingsTab: "temas"
};

function loadAppearance(){
  try{ const s=localStorage.getItem("appearance_v2"); if(s) APPEARANCE={...APPEARANCE,...JSON.parse(s)}; }catch(e){}
  applyAppearance();
}
function saveAppearance(){ localStorage.setItem("appearance_v2",JSON.stringify(APPEARANCE)); }

function hexToRgba(hex,a){
  if(!hex||!hex.startsWith("#")) return `rgba(0,0,0,${a})`;
  const hx=hex.replace("#","");
  const full=hx.length===3?hx.split("").map(c=>c+c).join(""):hx;
  const r=parseInt(full.slice(0,2),16),g=parseInt(full.slice(2,4),16),b=parseInt(full.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

function applyAppearance(){
  const theme=THEMES_DATA.find(t=>t.id===APPEARANCE.themeId)||THEMES_DATA[0];
  const font=FONTS_DATA.find(f=>f.id===APPEARANCE.fontId)||FONTS_DATA[0];
  const size=SIZES_DATA.find(s=>s.id===APPEARANCE.sizeId)||SIZES_DATA[2];
  const radius=RADIUS_DATA.find(r=>r.id===APPEARANCE.radiusId)||RADIUS_DATA[2];
  const spacing=SPACING_DATA.find(s=>s.id===APPEARANCE.spacingId)||SPACING_DATA[1];
  const c=APPEARANCE.customColors;
  const root=document.documentElement;
  const resolve=(key,fallback)=>c[key]||fallback;

  const bg=resolve("--bg",theme.bg); const surface=resolve("--surface",theme.surface);
  const surface2=resolve("--surface2",theme.surface2); const border=resolve("--border",theme.border);
  const border2=resolve("--border2",theme.border2); const text=resolve("--text",theme.text);
  const text2=resolve("--text2",theme.text2); const text3=resolve("--text3",theme.text3);
  const accent=resolve("--blue",theme.accent); const green=resolve("--green",theme.green);
  const red=resolve("--red",theme.red); const amber=resolve("--amber",theme.amber);
  const purple=resolve("--purple",theme.purple); const pink=resolve("--pink",theme.pink);

  root.style.setProperty("--bg",bg); root.style.setProperty("--surface",surface);
  root.style.setProperty("--surface2",surface2); root.style.setProperty("--border",border);
  root.style.setProperty("--border2",border2); root.style.setProperty("--text",text);
  root.style.setProperty("--text2",text2); root.style.setProperty("--text3",text3);
  root.style.setProperty("--blue",accent); root.style.setProperty("--blue-bg",hexToRgba(accent,.12));
  root.style.setProperty("--green",green); root.style.setProperty("--green-bg",hexToRgba(green,.12));
  root.style.setProperty("--red",red); root.style.setProperty("--red-bg",hexToRgba(red,.1));
  root.style.setProperty("--amber",amber); root.style.setProperty("--amber-bg",hexToRgba(amber,.1));
  root.style.setProperty("--purple",purple); root.style.setProperty("--purple-bg",hexToRgba(purple,.12));
  root.style.setProperty("--pink",pink); root.style.setProperty("--pink-bg",hexToRgba(pink,.12));
  root.style.setProperty("--fh",font.head); root.style.setProperty("--fb",font.body);
  document.body.style.fontFamily=font.body;
  root.style.setProperty("--fs-base",size.base); document.body.style.fontSize=size.base;
  root.style.setProperty("--r",radius.card); root.style.setProperty("--rs",radius.btn);
  const m=parseFloat(spacing.mult);
  root.style.setProperty("--space-sm",(8*m)+"px"); root.style.setProperty("--space-md",(12*m)+"px"); root.style.setProperty("--space-lg",(16*m)+"px");
  let styleEl=document.getElementById("dynamic-style");
  if(!styleEl){styleEl=document.createElement("style");styleEl.id="dynamic-style";document.head.appendChild(styleEl);}
  styleEl.textContent=`select option{background:${surface};} .app-header{background:${bg}ee;}`;
}

function setTheme(id){ APPEARANCE.themeId=id; APPEARANCE.customColors={}; saveAppearance(); applyAppearance(); renderSettings(); }
function setFont(id){ APPEARANCE.fontId=id; saveAppearance(); applyAppearance(); renderSettings(); }
function setSize(id){ APPEARANCE.sizeId=id; saveAppearance(); applyAppearance(); renderSettings(); }
function setRadius(id){ APPEARANCE.radiusId=id; saveAppearance(); applyAppearance(); renderSettings(); }
function setSpacing(id){ APPEARANCE.spacingId=id; saveAppearance(); applyAppearance(); renderSettings(); }

function applyColorPalette(id){
  const p=COLOR_PALETTES.find(p=>p.id===id); if(!p) return;
  Object.entries(p.colors).forEach(([k,v])=>{
    const cssKey=k==="accent"?"--blue":"--"+k;
    APPEARANCE.customColors[cssKey]=v;
    if(cssKey==="--blue") APPEARANCE.customColors["--blue-bg"]=hexToRgba(v,.12);
    if(cssKey==="--green") APPEARANCE.customColors["--green-bg"]=hexToRgba(v,.12);
    if(cssKey==="--red") APPEARANCE.customColors["--red-bg"]=hexToRgba(v,.1);
  });
  saveAppearance(); applyAppearance(); renderSettings();
}

function updateCustomColor(cssVar,hex){
  APPEARANCE.customColors[cssVar]=hex;
  if(cssVar==="--blue") APPEARANCE.customColors["--blue-bg"]=hexToRgba(hex,.12);
  if(cssVar==="--green") APPEARANCE.customColors["--green-bg"]=hexToRgba(hex,.12);
  if(cssVar==="--red") APPEARANCE.customColors["--red-bg"]=hexToRgba(hex,.1);
  if(cssVar==="--purple") APPEARANCE.customColors["--purple-bg"]=hexToRgba(hex,.12);
  if(cssVar==="--pink") APPEARANCE.customColors["--pink-bg"]=hexToRgba(hex,.12);
  saveAppearance(); applyAppearance();
  const prev=document.querySelector(`[data-cpick="${cssVar}"]`);
  if(prev) prev.style.background=hex;
}

function changeMonth(dir){
  CUR_MONTH+=dir;
  if(CUR_MONTH<0){CUR_MONTH=11;CUR_YEAR--;}
  if(CUR_MONTH>11){CUR_MONTH=0;CUR_YEAR++;}
  updateMonthLabel(); updateUI();
}
function updateMonthLabel(){
  const now=new Date();
  const isCur=CUR_MONTH===now.getMonth()&&CUR_YEAR===now.getFullYear();
  document.getElementById("month-label").textContent=MONTHS[CUR_MONTH]+" "+CUR_YEAR+(isCur?" • Atual":"");
}
function txsForMonth(m,y){ return TXS.filter(t=>{ const d=new Date(t.datetime); return d.getMonth()===m&&d.getFullYear()===y; }); }

// ════════════════════════════════════════════════
// UPDATE UI
// ════════════════════════════════════════════════
function updateUI(){
  const mTXS=txsForMonth(CUR_MONTH,CUR_YEAR);
  const inc=mTXS.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const exp=mTXS.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;
  document.getElementById("bal-inc").textContent=fmtR(inc);
  document.getElementById("bal-exp").textContent=fmtR(exp);
  const bt=document.getElementById("bal-tot");
  bt.textContent=fmtR(bal);
  bt.style.color=bal>=0?"var(--green)":"var(--red)";
  if(TAB==="history") renderHistory();
  if(TAB==="summary") renderSummary();
  if(TAB==="parcelas") renderParcelas();
}

  const box=document.getElementById("inst-box");

function calcInstParcela(){
  const amt=parseFloat(document.getElementById("f-amount")?.value)||0;
  const n=parseInt(document.getElementById("f-inst-n")?.value)||1;
  const prev=document.getElementById("inst-preview");
  if(!prev) return;
  if(amt>0&&n>1) prev.textContent=`Parcela mensal: ${fmtR(amt/n)} × ${n} meses = ${fmtR(amt)} total`;
  else prev.textContent="";
}

  const subs=(allCats()[fCat]||[]);

  if(el) el.innerHTML=subs.map(s=>`<button class="chip" onclick="selectSub('${s.replace(/'/g,"\\'")}',this)">${s}</button>`).join("");
  const subInp=document.getElementById("f-sub");
  if(subInp) subInp.value="";
}

  document.querySelectorAll("#subcat-chips .chip").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  const subInp=document.getElementById("f-sub");
  if(subInp) subInp.value=s;
}

  fType=t;
  document.querySelectorAll(".type-btn").forEach(b=>b.classList.remove("ae","ai"));
  el.classList.add(t==="expense"?"ae":"ai");

function submitTX(){
  const amount=parseFloat(document.getElementById("f-amount")?.value);
  const desc=(document.getElementById("f-desc")?.value||"").trim();
  const cat=document.getElementById("f-cat")?.value||fCat;
  const sub=(document.getElementById("f-sub")?.value||"").trim();
  const date=document.getElementById("f-date")?.value;
  const time=document.getElementById("f-time")?.value;
  const note=(document.getElementById("f-note")?.value||"").trim();
  const isInst=document.getElementById("f-is-inst")?.checked||false;
  const instN=parseInt(document.getElementById("f-inst-n")?.value)||1;
  const err=document.getElementById("form-err");
  if(!amount||amount<=0){if(err)err.innerHTML=`<div class="msg-box msg-err">⚠️ Informe um valor válido</div>`;return;}
  if(!desc){if(err)err.innerHTML=`<div class="msg-box msg-err">⚠️ Informe uma descrição</div>`;return;}

  const groupId="grp_"+Date.now();
  const baseDateObj=new Date(date+"T"+time);

  if(isInst&&fType==="expense"&&instN>1){
    const parcela=amount/instN;
    for(let i=0;i<instN;i++){
      const d=new Date(baseDateObj); d.setMonth(d.getMonth()+i);
      const dStr=d.toISOString().slice(0,10);
      const tx={
        id:"tx_"+Date.now()+"_"+Math.random().toString(36).slice(2,6)+"_"+i,
        type:"expense",amount:Math.round(parcela*100)/100,
        description:desc+" ("+(i+1)+"/"+instN+")",
        category:cat,subcategory:sub,
        datetime:dStr+"T"+time,
        payment:fPay,cardId:fCard,notes:note,who:WHO,
        isInstallment:true,installmentGroup:groupId,
        installmentIndex:i+1,installmentTotal:instN,
        createdAt:new Date().toISOString()
      };
      TXS.unshift(tx); saveTX(tx);
    }
    showMsg("add-msg",`✅ ${instN} parcelas de ${fmtR(amount/instN)} criadas!`,"ok");
  } else {
    const tx={
      id:"tx_"+Date.now()+"_"+Math.random().toString(36).slice(2,7),
      type:fType,amount,description:desc,
      category:cat,subcategory:sub,
      datetime:date+"T"+time,
      payment:fPay,cardId:fCard,notes:note,who:WHO,
      isInstallment:false,
      createdAt:new Date().toISOString()
    };
    TXS.unshift(tx); saveTX(tx);
    showMsg("add-msg",`✅ ${fType==="income"?"Receita":"Gasto"} de ${fmtR(amount)} adicionado!`,"ok");
  }

  fType="expense"; fCat=catNames()[0]; fPay="pix"; fCard="";
  renderAddForm(); updateUI();
}

function setEditType(t){

  document.getElementById("edit-btn-income")?.classList.toggle("ai",t==="income");
  document.getElementById("edit-btn-expense")?.classList.toggle("ai",false);
  document.getElementById("edit-btn-income")?.classList.toggle("ae",false);
}

function onEditCatChange(){
  editCat=document.getElementById("e-cat")?.value;
  const subs=(allCats()[editCat]||[]);
  const chipsEl=document.getElementById("edit-subcat-chips");
  if(chipsEl) chipsEl.innerHTML=subs.map(s=>`<button class="chip" onclick="selectEditSub('${s.replace(/'/g,"\\'")}',this)">${s}</button>`).join("");

function setEditPay(v,el){
  editPay=v; editCard="";
  document.querySelectorAll("#modal-body .pay-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  const cardSection=document.getElementById("card-section-edit");
  if(cardSection) cardSection.style.display=(v==="credito"||v==="debito")?"":"none";
  document.querySelectorAll("#card-chips-edit .card-chip").forEach(b=>b.classList.remove("active"));
  const nenhum=document.querySelector("#card-chips-edit .card-chip:last-child");
  if(nenhum) nenhum.classList.add("active");
}

function selectEditCard(id,el){
  editCard=id;
  document.querySelectorAll("#card-chips-edit .card-chip").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

function closeModal(){
  document.getElementById("modal-ov").classList.remove("open");
  EDIT_ID=null;
}

function saveEdit(){
  const amount=parseFloat(document.getElementById("e-amount")?.value);
  const desc=(document.getElementById("e-desc")?.value||"").trim();
  const cat=document.getElementById("e-cat")?.value||editCat;
  const sub=(document.getElementById("e-sub")?.value||"").trim();
  const date=document.getElementById("e-date")?.value;
  const time=document.getElementById("e-time")?.value;
  const note=(document.getElementById("e-note")?.value||"").trim();
  if(!amount||amount<=0||!desc){ showMsg("edit-form-err","⚠️ Preencha valor e descrição","err"); return; }
  const idx=TXS.findIndex(t=>t.id===EDIT_ID);
  if(idx<0) return;
  TXS[idx]={...TXS[idx],type:editType,amount,description:desc,category:cat,subcategory:sub,datetime:(date||"")+"T"+(time||""),payment:editPay,cardId:editCard,notes:note,edited:true};
  saveTX(TXS[idx]);
  showMsg("edit-msg","✅ Lançamento atualizado!","ok");
  setTimeout(()=>{ closeModal(); updateUI(); },800);
}

function deleteFromModal(){
  const w=document.getElementById("confirm-del-wrap");
  if(!w) return;
  if(w.innerHTML){w.innerHTML="";return;}
  w.innerHTML=`<div class="confirm-box">
    <div class="confirm-txt">Confirmar exclusão?</div>
    <div class="confirm-row">
      <button class="confirm-yes" onclick="confirmDelete()">Sim, excluir</button>
      <button class="confirm-no" onclick="document.getElementById('confirm-del-wrap').innerHTML=''">Cancelar</button>
    </div>
  </div>`;
}

function confirmDelete(){
  deleteTXById(EDIT_ID);
  closeModal(); updateUI();
  if(TAB==="history") renderHistory();
}

function setFlt(f){ HIST_FILTER=f; renderHistory(); }

function getCardLabel(cardId){
  if(!cardId) return null;
  const card=allCards().find(c=>c.id===cardId);
  return card?`${card.emoji} ${card.name}`:null;
}

function applyHistFilter(mTXS){
  mTXS=mTXS||txsForMonth(CUR_MONTH,CUR_YEAR);
  const q=(document.getElementById("hist-search")?.value||"").toLowerCase();
  let list=mTXS;
  if(HIST_FILTER==="expense") list=list.filter(t=>t.type==="expense");
  else if(HIST_FILTER==="income") list=list.filter(t=>t.type==="income");
  else if(HIST_FILTER==="installment") list=list.filter(t=>t.isInstallment);
  else if(HIST_FILTER==="credito") list=list.filter(t=>t.payment==="credito");
  else if(HIST_FILTER==="debito") list=list.filter(t=>t.payment==="debito");
  else if(HIST_FILTER!=="all") list=list.filter(t=>t.category===HIST_FILTER);
  if(q) list=list.filter(t=>(t.description||"").toLowerCase().includes(q)||(t.category||"").toLowerCase().includes(q)||(t.subcategory||"").toLowerCase().includes(q));
  const el=document.getElementById("tx-list");
  if(!el) return;
  if(!list.length){el.innerHTML=`<div class="empty-state">📭 Nenhum lançamento encontrado.</div>`;return;}
  el.innerHTML=list.map(t=>{
    const dt=new Date(t.datetime);
    const ds=dt.toLocaleDateString("pt-BR",{day:"2-digit",month:"short"})+" "+dt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    const payLabel=BASE_PAYS.find(p=>p.v===t.payment)?.l||t.payment||"";
    const cardLabel=getCardLabel(t.cardId);
    return `<div class="tx-card ${t.isInstallment?"is-installment":""}" onclick="openEdit('${t.id}')">
      <div class="tx-top">
        <div class="tx-left">
          <div class="tx-cat-row">
            <span class="tx-cat">${t.category||"—"}</span>
            ${t.subcategory?`<span class="tx-subcat">${t.subcategory}</span>`:""}
            ${t.isInstallment?`<span class="tx-inst-badge">🔄 ${t.installmentIndex||""}/${t.installmentTotal||""}</span>`:""}
            ${cardLabel?`<span class="tx-card-badge">${cardLabel}</span>`:""}
          </div>
          <span class="tx-desc">${t.description||"—"}</span>
        </div>
        <span class="tx-amount" style="color:${t.type==="income"?"var(--green)":"var(--red)"}">${t.type==="income"?"+":"−"}${fmtR(t.amount)}</span>
      </div>
      <div class="tx-meta">
        <span>${ds}</span>
        <span class="tx-pay">${payLabel}</span>
        <span class="tx-badge tx-badge-${t.who}">${t.who==="marido"?"👨":"👩"} ${t.who||""}</span>
        ${t.edited?`<span class="tx-edited">✏️ editado</span>`:""}
      </div>
    </div>`;
  }).join("");
}

function renderParcelas(){
  const c=document.getElementById("parcelas-content");
  const allInst=TXS.filter(t=>t.isInstallment&&t.type==="expense");
  const groups={};
  allInst.forEach(t=>{
    const g=t.installmentGroup||t.id;
    if(!groups[g]) groups[g]={txs:[],name:t.description?.replace(/ \(\d+\/\d+\)$/,""),total:t.installmentTotal||1,amount:t.amount,category:t.category};
    groups[g].txs.push(t);
  });
  if(!Object.keys(groups).length){ c.innerHTML=`<div class="empty-state">🔄 Nenhum parcelamento ativo.<br><br>Ao adicionar um gasto, marque a opção "É um gasto parcelado?" para criar parcelas automáticas.</div>`; return; }
  const now=new Date();
  const rows=Object.entries(groups).map(([gid,g])=>{
    const paid=g.txs.filter(t=>{ const d=new Date(t.datetime); return d<=now; }).length;
    const remaining=g.total-paid;
    return {gid,g,paid,remaining,totalVal:g.amount*g.total,remainingVal:g.amount*remaining};
  }).filter(r=>r.remaining>0).sort((a,b)=>b.remainingVal-a.remainingVal);
  if(!rows.length){ c.innerHTML=`<div class="empty-state">✅ Todos os parcelamentos foram quitados!</div>`; return; }
  const totalComp=rows.reduce((s,r)=>s+r.remainingVal,0);
  c.innerHTML=`
  <div class="sum-card" style="margin-bottom:14px;">
    <div class="sum-title">💜 Total Comprometido em Parcelas</div>
    <div style="font-family:var(--fh);font-size:28px;font-weight:800;color:var(--purple);text-align:center;padding:8px 0;">${fmtR(totalComp)}</div>
    <div style="font-size:12px;color:var(--text3);text-align:center;">${rows.length} parcelamento(s) ativo(s)</div>
  </div>
  <div class="inst-sum-card">
    <div class="inst-sum-title">🔄 Parcelamentos Ativos</div>
    ${rows.map(({g,paid,remaining,totalVal,remainingVal})=>`
    <div class="inst-item">
      <div class="inst-name">
        <div style="font-weight:600;font-size:13px;">${g.name}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px;">${g.category} • ${paid}/${g.total} parcelas pagas</div>
        <div style="font-size:11px;color:var(--text3);">${fmtR(g.amount)}/mês • Total: ${fmtR(totalVal)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:12px;">
        <div class="inst-info">${remaining}x restantes</div>
        <div style="font-family:var(--fh);font-size:14px;font-weight:800;color:var(--purple);">${fmtR(remainingVal)}</div>
      </div>
    </div>`).join("")}
  </div>`;
}

  const prevY=CUR_MONTH===0?CUR_YEAR-1:CUR_YEAR;

  const exp=mTXS.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const pExp=pTXS.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;
  const savePct=inc>0?Math.round((bal/inc)*100):0;
  const score=calcScore(inc,exp);
  const catTotals={};
  mTXS.filter(t=>t.type==="expense").forEach(t=>catTotals[t.category]=(catTotals[t.category]||0)+t.amount);
  const sortedCats=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);

  // Card totals
  const cardTotals={};
  mTXS.filter(t=>t.type==="expense"&&t.cardId).forEach(t=>{
    if(!cardTotals[t.cardId]) cardTotals[t.cardId]={total:0,count:0};
    cardTotals[t.cardId].total+=t.amount;
    cardTotals[t.cardId].count++;
  });
  const sortedCards=Object.entries(cardTotals).sort((a,b)=>b[1].total-a[1].total);

  // Payment method totals
  const payTotals={};
  mTXS.filter(t=>t.type==="expense").forEach(t=>{
    payTotals[t.payment]=(payTotals[t.payment]||0)+t.amount;
  });

  const mariExp=mTXS.filter(t=>t.who==="marido"&&t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const espExp=mTXS.filter(t=>t.who==="esposa"&&t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const mariN=mTXS.filter(t=>t.who==="marido"&&t.type==="expense").length;
  const espN=mTXS.filter(t=>t.who==="esposa"&&t.type==="expense").length;
  const insights=genInsights(mTXS,pTXS,inc,exp,pExp,catTotals,cardTotals);
  const c=document.getElementById("summary-content");

  c.innerHTML=`
  <div class="sum-card">
    <div class="sum-title">📅 ${MONTHS[CUR_MONTH]} ${CUR_YEAR}</div>
    ${[["Receita total",fmtR(inc),"var(--green)"],["Gasto total",fmtR(exp),"var(--red)"],["Saldo",fmtR(bal),bal>=0?"var(--green)":"var(--red)"],["Economia",savePct+"% da renda",savePct>=20?"var(--green)":"var(--amber)"],["vs Mês anterior",pExp>0?(exp>pExp?"▲ +"+(Math.round((exp-pExp)/pExp*100))+"%":"▼ −"+(Math.round((pExp-exp)/pExp*100))+"%"):"—",exp>pExp?"var(--red)":"var(--green)"],["Total de lançamentos",mTXS.length,"var(--text2)"]].map(([k,v,col])=>`<div class="sum-row"><span class="sum-name">${k}</span><span class="sum-val" style="color:${col}">${v}</span></div>`).join("")}
  </div>

  ${score!==null?`
  <div class="score-card">
    <div class="sum-title" style="text-align:center;">🏆 Score Financeiro</div>
    <div class="score-num" style="color:${score>=70?"var(--green)":score>=40?"var(--amber)":"var(--red)"}">${score}</div>
    <div class="score-lbl">${score>=70?"Saúde Financeira Boa 🟢":score>=40?"Atenção Necessária 🟡":"Situação Crítica 🔴"}</div>
    <div class="score-bar-bg"><div class="score-bar-fill" style="width:${score}%;background:${score>=70?"var(--green)":score>=40?"var(--amber)":"var(--red)"}"></div></div>
    <div style="font-size:11px;color:var(--text3);">0 — Crítico &nbsp; 50 — Estável &nbsp; 100 — Excelente</div>
  </div>`:""}

  <div class="sum-title" style="margin-bottom:10px;">👫 Por Pessoa</div>
  <div class="person-grid">
    <div class="person-card"><div class="person-emoji">👨</div><div class="person-name marido">Marido</div><div class="person-amount">${fmtR(mariExp)}</div><div class="person-count">${mariN} lançamentos</div></div>
    <div class="person-card"><div class="person-emoji">👩</div><div class="person-name esposa">Esposa</div><div class="person-amount">${fmtR(espExp)}</div><div class="person-count">${espN} lançamentos</div></div>
  </div>

  ${sortedCards.length?`
  <div class="card-sum-card">
    <div class="card-sum-title">💳 Gastos por Cartão</div>
    ${sortedCards.map(([cardId,data])=>{
      const card=allCards().find(c=>c.id===cardId)||{emoji:"💳",name:cardId};
      const pct=exp>0?Math.round(data.total/exp*100):0;
      return `<div class="card-item">
        <div class="card-item-left">
          <div class="card-item-name">${card.emoji} ${card.name}</div>
          <div class="card-item-count">${data.count} transação(ões) • ${pct}% dos gastos</div>

        </div>
        <div class="card-item-val">${fmtR(data.total)}</div>
      </div>`;
    }).join("")}

    <div class="sum-title">💳 Gastos por Forma de Pagamento</div>

}

function calcScore(inc,exp){
  if(!inc&&!exp) return null;
  let s=100;
  const pct=inc>0?(exp/inc):1;
  if(pct>1) s-=40; else if(pct>0.9) s-=25; else if(pct>0.75) s-=15; else if(pct>0.6) s-=5;
  return Math.max(0,Math.min(100,s));
}

function genInsights(mTXS,pTXS,inc,exp,pExp,catTotals,cardTotals){
  const ins=[];
  if(pExp>0){
    const d=exp-pExp, p=Math.abs(Math.round(d/pExp*100));
    if(d>0) ins.push({icon:"📈",text:`Gastos <strong>subiram ${p}%</strong> vs mês anterior (+${fmtR(d)}).`});
    else ins.push({icon:"📉",text:`Ótimo! Gastos <strong>caíram ${p}%</strong> vs mês anterior (economia de ${fmtR(Math.abs(d))}).`});
  }
  const top=Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0];
  if(top) ins.push({icon:"🏷️",text:`Maior categoria: <strong>${top[0]}</strong> com ${fmtR(top[1])} (${inc>0?Math.round(top[1]/inc*100):0}% da renda).`});
  if(cardTotals&&Object.keys(cardTotals).length){
    const topCard=Object.entries(cardTotals).sort((a,b)=>b[1].total-a[1].total)[0];
    if(topCard){
      const cardInfo=allCards().find(c=>c.id===topCard[0])||{emoji:"💳",name:topCard[0]};
      ins.push({icon:"💳",text:`Cartão mais usado: <strong>${cardInfo.emoji} ${cardInfo.name}</strong> com ${fmtR(topCard[1].total)} (${topCard[1].count} transações).`});
    }
  }
  if(inc>0&&exp/inc<0.5) ins.push({icon:"🎉",text:`Excelente! Você poupou <strong>${Math.round((1-exp/inc)*100)}%</strong> da renda este mês.`});
  if(inc>0&&exp/inc>0.9) ins.push({icon:"🚨",text:`Atenção: <strong>${Math.round(exp/inc*100)}%</strong> da renda foi gasta. Tente reduzir gastos variáveis.`});
  const instExp=mTXS.filter(t=>t.isInstallment&&t.type==="expense").reduce((s,t)=>s+t.amount,0);
  if(instExp>0) ins.push({icon:"🔄",text:`Parcelas comprometeram <strong>${fmtR(instExp)}</strong> este mês (${inc>0?Math.round(instExp/inc*100):0}% da renda).`});
  return ins.slice(0,5);
}

            <div class="tdot" style="background:${t.bg};border:1px solid #55555588;"></div>

            <div class="tdot" style="background:${t.accent};"></div>
            <div class="tdot" style="background:${t.green};"></div>
            <div class="tdot" style="background:${t.red};"></div>
          </div>

          <div class="theme-sub">${t.sub}</div>

      </div>
    </div>
  </div>

  <div class="stab-panel ${stab==="cores"?"active":""}" data-panel="cores">
    <div class="settings-section">
      <div class="settings-section-title">⚡ Paletas Rápidas</div>
      <div class="palette-row">
        ${COLOR_PALETTES.map(p=>`
        <div class="palette-chip" onclick="applyColorPalette('${p.id}')">
          <div class="palette-chip-dots">
            <div class="palette-dot" style="background:${p.colors.accent}"></div>
            <div class="palette-dot" style="background:${p.colors.green}"></div>
            <div class="palette-dot" style="background:${p.colors.red}"></div>

          <span class="palette-name">${p.name}</span>
        </div>`).join("")}
      </div>
    </div>
    <div class="settings-section">

      ${colorSections.map(sec=>`
      <div class="color-section">
        <div class="color-section-header"><h4>${sec.title}</h4><p>${sec.desc}</p></div>
        ${sec.items.map(item=>`
        <div class="color-picker-row">
          <div><div class="cpick-label">${item.label}</div><div class="cpick-sub">${item.sub}</div></div>
          <div class="cpick-right">
            <div class="cpick-preview" data-cpick="${item.key}" style="background:${getColor(item.key)};" onclick="this.nextElementSibling.click()"></div>
            <input type="color" value="${getColor(item.key)}" oninput="updateCustomColor('${item.key}',this.value)" onchange="updateCustomColor('${item.key}',this.value)"/>
          </div>
        </div>`).join("")}
      </div>`).join("")}
      <button class="reset-btn" onclick="if(confirm('Resetar cores?')){APPEARANCE.customColors={};saveAppearance();applyAppearance();renderSettings();}">↩️ Resetar cores</button>
    </div>
  </div>

  <div class="stab-panel ${stab==="tipografia"?"active":""}" data-panel="tipografia">
    <div class="settings-section">
      <div class="settings-section-title">🔤 Família Tipográfica</div>
      <div class="font-grid">
        ${FONTS_DATA.map(f=>`
        <div class="font-card ${APPEARANCE.fontId===f.id?"selected":""}" onclick="setFont('${f.id}')">
          <div class="font-sample" style="font-family:${f.head}">${f.sample}</div>
          <div class="font-name">${f.name}</div>
          <div class="font-pair">${f.pair}</div>
        </div>`).join("")}
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">📏 Tamanho do Texto</div>
      <div class="size-row">
        ${SIZES_DATA.map(s=>`
        <div class="size-btn ${APPEARANCE.sizeId===s.id?"selected":""}" onclick="setSize('${s.id}')">
          <span class="size-btn-label" style="font-size:${s.base}">${s.label}</span>
          <span class="size-btn-val">${s.base}</span>
        </div>`).join("")}
      </div>
    </div>
    <button class="reset-btn" onclick="if(confirm('Restaurar tudo ao padrão?'))resetAllAppearance()">🔄 Restaurar padrão</button>
  </div>

  <div class="stab-panel ${stab==="categorias"?"active":""}" data-panel="categorias">
    <div class="settings-section">
      <div class="settings-section-title">📂 Categorias Padrão</div>
      ${Object.keys(DEFAULT_CATS).map(cat=>`
      <div class="cat-item"><span class="cat-item-name">${cat}</span><span class="cat-item-default">Padrão</span></div>`).join("")}
    </div>
    <div class="settings-section">
      <div class="settings-section-title">✨ Minhas Categorias</div>
      ${Object.keys(USER_CATS).length?Object.keys(USER_CATS).map(cat=>`
      <div class="cat-item">
        <span class="cat-item-name">${cat}</span>
        <button class="cat-del-btn" onclick="deleteCat('${cat.replace(/'/g,"\\'")}')">Remover</button>

      </div>

  <div class="stab-panel ${stab==="sobre"?"active":""}" data-panel="sobre">

      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center;">
        <div style="font-size:40px;margin-bottom:10px;">💰</div>
        <div style="font-family:var(--fh);font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px;">Finanças do Lar</div>
        <div style="font-size:13px;color:var(--text3);margin-bottom:16px;">Controle financeiro para o casal</div>
        <div style="display:flex;flex-direction:column;gap:8px;text-align:left;">

    </div>

      <button class="reset-btn" onclick="if(confirm('Apagar todos os dados locais?')){localStorage.clear();location.reload();}">⚠️ Limpar todos os dados locais</button>
    </div>
  </div>`;
}

function addUserCard(){
  const nameInp=document.getElementById("new-card-name");
  const emojiInp=document.getElementById("new-card-emoji");
  const name=(nameInp?.value||"").trim();
  const emoji=(emojiInp?.value||"💳").trim()||"💳";
  if(!name){ showMsg("card-msg","⚠️ Digite o nome do cartão","err"); return; }
  const id="custom_"+Date.now();
  USER_CARDS.push({id, name, emoji});
  saveUserCards();
  if(nameInp) nameInp.value="";
  if(emojiInp) emojiInp.value="";
  showMsg("card-msg","✅ Cartão adicionado!","ok");
  renderSettings();
}

function deleteUserCard(index){
  USER_CARDS.splice(index,1);
  saveUserCards();
  renderSettings();
}

function addCat(){
  const inp=document.getElementById("new-cat-inp");
  const v=inp?.value.trim();
  if(!v){ showMsg("cat-msg","⚠️ Digite um nome","err"); return; }
  if(DEFAULT_CATS[v]||USER_CATS[v]){ showMsg("cat-msg","⚠️ Categoria já existe","err"); return; }
  USER_CATS[v]=["Outros"]; saveUserCats();
  inp.value=""; showMsg("cat-msg","✅ Categoria criada!","ok"); renderSettings();
}

function deleteCat(cat){ delete USER_CATS[cat]; saveUserCats(); renderSettings(); }

// ════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════
function fmtR(v){ return "R$ "+(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}); }

function showMsg(id,txt,type){
  const el=document.getElementById(id);
  if(!el) return;
  el.innerHTML=`<div class="msg-box msg-${type}">${txt}</div>`;
  setTimeout(()=>{ if(el) el.innerHTML=""; },3000);
}

// ════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════
window.addEventListener("DOMContentLoaded",()=>{
  const loading=document.getElementById("loading-screen");
  loading.style.display="flex";
  loadAppearance();
  initFirebase();
  try{ USER_CATS=JSON.parse(localStorage.getItem("user_cats")||"{}"); }catch(e){ USER_CATS={}; }
  try{ USER_CARDS=JSON.parse(localStorage.getItem("user_cards")||"[]"); }catch(e){ USER_CARDS=[]; }
  setTimeout(()=>{
    loading.style.display="none";
    const saved=localStorage.getItem("who");
    if(saved){ WHO=saved; showApp(); }
    else { document.getElementById("login-screen").style.display="flex"; }
  },800);
});
</script>
